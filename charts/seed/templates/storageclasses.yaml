{{- define "seed.storage-provisioner" -}}
  {{- if semverCompare ">= 1.20-0" .Capabilities.KubeVersion.Version -}}
    cinder.csi.openstack.org
  {{- else -}}
    kubernetes.io/cinder
  {{- end -}}
{{- end -}}
{{- define "seed.storage-expansion" -}}
  {{- if semverCompare ">= 1.20-0" .Capabilities.KubeVersion.Version -}}
    true
  {{- else -}}
    false
  {{- end -}}
{{- end -}}
{{- define "seed.dns-name" -}}
  {{- . | lower | regexReplaceAll "[^a-z0-9-]" "-" | trimSuffix "-" | trimPrefix "-" -}}
{{- end -}}

{{- if and (not .Values.seedKubeadm) (not .Values.seedVirtual) .Values.openstack -}}

{{- range $az := .Values.openstack.azs -}}
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: cinder-zone-{{ $az | trunc -1 }}
provisioner: {{ template "seed.storage-provisioner" $ }}
allowVolumeExpansion: {{ template "seed.storage-expansion" $ }}
volumeBindingMode: Immediate
parameters:
  availability: {{ $az }}
---
{{- end -}}

{{- range $vt := .Values.openstack.volumeTypes -}}
{{- $name := include "seed.dns-name" $vt -}}
{{- if $name -}}
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: cinder-{{ $name }}
provisioner: {{ template "seed.storage-provisioner" $ }}
allowVolumeExpansion: {{ template "seed.storage-expansion" $ }}
volumeBindingMode: WaitForFirstConsumer
parameters:
  type: {{ $vt }}
---
{{- end -}}
{{- end -}}

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: cinder-default
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: {{ template "seed.storage-provisioner" $ }}
allowVolumeExpansion: {{ template "seed.storage-expansion" $ }}
volumeBindingMode: WaitForFirstConsumer

{{- end -}}
